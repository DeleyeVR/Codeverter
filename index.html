<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Programming Languages</title>
    <style>
        .card { border: 1px solid #ccc; border-radius: 5px; padding: 10px; margin: 10px; display: inline-block; }
    </style>
</head>
<body>
    <h1>Programming Languages</h1>
    <input type="text" id="search" placeholder="Search languages..."><br><br>
    <div id="languages">
        <div class="card">JSON</div>
        <div class="card">Go</div>
        <div class="card">Rust</div>
        <div class="card">TypeScript</div>
        <div class="card">C++</div>
        <div class="card">Swift</div>
        <div class="card">Kotlin</div>
        <div class="card">Python</div>
        <div class="card">Java</div>
        <div class="card">C#</div>
        <div class="card">Ruby</div>
    </div>
    <script>
        const searchInput = document.getElementById('search');
        const cards = document.querySelectorAll('.card');

        searchInput.addEventListener('input', () => {
            const searchTerm = searchInput.value.toLowerCase();
            cards.forEach(card => {
                const text = card.textContent.toLowerCase();
                card.style.display = text.includes(searchTerm) ? 'inline-block' : 'none';
            });
        });
    </script>
</body>
</html>
